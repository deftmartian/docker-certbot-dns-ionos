name: CI

on:
  push:
    branches: [main]
    tags: ["*.*.*"]
  pull_request:
  schedule:
    - cron: "17 8 * * 1"
  workflow_dispatch:

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Lint shell scripts
        uses: ludeeus/action-shellcheck@2.0.0

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: Dockerfile

  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build test image
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: docker-certbot-dns-ionos:test

      - name: Validate Compose example
        env:
          IONOS_DOMAINS: smoke-test.example
          IONOS_EMAIL: smoke-test@example.com
        run: docker compose config --quiet

      - name: Run smoke test
        run: |
          tests/smoke.sh docker-certbot-dns-ionos:test
          EXPECTED_UID=1883 EXPECTED_GID=1883 \
            tests/smoke.sh docker-certbot-dns-ionos:test

      - name: Scan image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: docker-certbot-dns-ionos:test
          scanners: vuln
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1

  multi-platform-build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build supported platforms
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64,linux/arm/v6
          push: false
          cache-to: type=gha,mode=max
          cache-from: type=gha

  publish:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    needs: [lint, build-and-test, multi-platform-build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate release metadata
        shell: bash
        run: |
          image_version=$(sed -n 's/^ARG IMAGE_VERSION=//p' Dockerfile)
          test "${GITHUB_REF_NAME}" = "${image_version}"
          grep -Fxq "## ${GITHUB_REF_NAME}" CHANGELOG

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=ref,event=tag
            type=sha,format=long

      - name: Publish supported platforms
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64,linux/arm/v6
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            IMAGE_VERSION=${{ github.ref_name }}
          cache-to: type=gha,mode=max
          cache-from: type=gha

  release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Create GitHub release from changelog
        shell: bash
        run: |
          awk -v version="${GITHUB_REF_NAME}" '
            $0 == "## " version { in_release = 1; next }
            in_release && /^## / { exit }
            in_release { print }
          ' CHANGELOG > release-notes.md
          test -s release-notes.md
          gh release create "${GITHUB_REF_NAME}" \
            --verify-tag \
            --title "${GITHUB_REF_NAME}" \
            --notes-file release-notes.md
